<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
  <title>PA GA Guide</title>
  <meta name="description" content="Pennsylvania General Assembly legislator guide for REA government affairs"/>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1f3a68"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PA GA"/>
  <link rel="apple-touch-icon" href="icons/icon-180.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>

  <link rel="stylesheet" href="app/style.css"/>
  <style>
    /* 100svh = small viewport: stable across iOS PWA keyboard + system-UI
       transitions. 100dvh produced first-paint sizing glitches on cold
       launch where the layout was wrong until a later reflow corrected it. */
    html, body { margin: 0; padding: 0; height: 100vh; height: 100svh; background: #2a2620; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
    .stage { display: flex; align-items: center; justify-content: center; transform-origin: center center; }
    .credit { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.4); pointer-events: none; }

    /* Standalone (home-screen install): drop the dark stage + device frame and
       let the screens fill the actual iOS viewport. The fake device chrome
       inside IOSDevice would otherwise nest inside the real iOS chrome. */
    @media (display-mode: standalone) {
      html, body { background: var(--paper, #f6f2ea); }
      .credit { display: none; }
    }
    .standalone-root {
      width: 100%;
      height: 100vh;
      height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--paper, #f6f2ea);
    }
  </style>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="app/data.js"></script>
</head>
<body>
  <div id="root"></div>
  <div class="credit">PA GA Guide · prototype · data updates monthly from palegis.us</div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="app/Portrait.jsx"></script>
  <script type="text/babel" src="app/atoms.jsx"></script>
  <script type="text/babel" src="app/screens-1.jsx"></script>
  <script type="text/babel" src="app/screens-2.jsx"></script>
  <script type="text/babel" src="app/screens-3.jsx"></script>

  <script type="text/babel">
    // True when launched from iOS home screen (Add to Home Screen) or any
    // PWA-installed context. We render frameless in that case.
    const isStandalone = () =>
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
      window.navigator.standalone === true;

    function App() {
      const [standalone] = React.useState(isStandalone);
      const [ready, setReady] = React.useState(!!window.LEGISLATORS);
      React.useEffect(() => {
        if (ready) return;
        window.dataReady.then(() => setReady(true));
      }, [ready]);

      // Nudge layout after mount: iOS PWAs sometimes use stale viewport /
      // safe-area values on the very first paint (cold launch). Firing a
      // resize event after the first frame lets svh/safe-area-aware
      // listeners re-measure once the OS has settled.
      React.useLayoutEffect(() => {
        const id = requestAnimationFrame(() => window.dispatchEvent(new Event('resize')));
        return () => cancelAnimationFrame(id);
      }, []);

      // Fit device into viewport — only used when not standalone.
      const stageRef = React.useRef(null);
      React.useEffect(() => {
        if (standalone) return;
        const fit = () => {
          const el = stageRef.current; if (!el) return;
          const pad = 40;
          const sx = (window.innerWidth - pad) / 402;
          const sy = (window.innerHeight - pad) / 874;
          const s = Math.min(1, sx, sy);
          el.style.transform = `scale(${s})`;
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, [standalone]);

      // Stack-based router
      const [stack, setStack] = React.useState([{ screen: 'search' }]);
      const [tab, setTab] = React.useState('search');

      const go = (screen, params = {}) => {
        if (screen === 'back') {
          setStack(s => s.length > 1 ? s.slice(0, -1) : s);
          return;
        }
        if (['search','federal','bycoop','committees','settings'].includes(screen)) {
          setTab(screen);
          setStack([{ screen, ...params }]);
        } else {
          setStack(s => [...s, { screen, ...params }]);
        }
      };

      const current = stack[stack.length - 1];

      const renderScreen = () => {
        switch (current.screen) {
          case 'search':     return <SearchScreen go={go}/>;
          case 'federal':    return <FederalScreen go={go}/>;
          case 'bycoop':     return <ByCoopScreen go={go}/>;
          case 'coop':       return <CoopDetailScreen name={current.name} go={go}/>;
          case 'committees': return <CommitteesScreen go={go}/>;
          case 'settings':   return <SettingsScreen go={go}/>;
          case 'profile':    return <ProfileScreen id={current.id} go={go}/>;
          case 'committee':  return <CommitteeScreen id={current.id} go={go}/>;
          default:           return <SearchScreen go={go}/>;
        }
      };

      const showTab = ['search','federal','bycoop','committees','settings'].includes(current.screen);

      const inner = (
        <div className="app" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          {/* status-bar spacer: in standalone, defer to safe-area; in browser, leave room for the fake bar */}
          <div style={{ height: standalone ? 'env(safe-area-inset-top, 0)' : 50 }}/>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
            {renderScreen()}
          </div>
          {showTab && <TabBar active={tab} go={go}/>}
        </div>
      );

      if (!ready) {
        return (
          <div style={{ position: 'fixed', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.5)', fontSize: 13, letterSpacing: 0.5 }}>
            Loading…
          </div>
        );
      }

      if (standalone) {
        return <div className="standalone-root">{inner}</div>;
      }
      return (
        <div className="stage" ref={stageRef}>
          <IOSDevice>{inner}</IOSDevice>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <!-- Service worker for offline use -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e47fec0c7d5b4b30851b3e2ea4a35607"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
